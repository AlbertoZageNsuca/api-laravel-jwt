[phases.setup]
nixPkgs = ["php", "phpPackages.composer", "phpPackages.pdo", "phpPackages.pdo_mysql", "phpPackages.mbstring", "phpPackages.curl"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
